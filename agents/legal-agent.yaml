        "risk_level": "LOW",
        "checks_completed": {
          "identity": "VERIFIED",
          "address": "VERIFIED",
          "sanctions": "CLEAR",
          "pep": "NOT PEP",
          "source_of_funds": "VERIFIED"
        },
